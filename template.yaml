AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Scots Music Group static site infrastructure.
  S3 bucket (private, OAC-only) + CloudFront distribution.
  Deploy with: sam deploy --guided

Parameters:
  DomainName:
    Type: String
    Default: ''
    Description: Custom domain (e.g. www.scotsmusic.org). Leave blank to use CloudFront domain.
  AcmCertificateArn:
    Type: String
    Default: ''
    Description: ACM certificate ARN for custom domain (us-east-1). Leave blank if no custom domain.

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, '']]

Resources:
  # ---- S3 Bucket (private, no public access) ----
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'smg-site-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: CleanOldVersions
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 30

  # ---- Bucket Policy — CloudFront OAC only ----
  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

  # ---- CloudFront Origin Access Control ----
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'smg-oac-${AWS::AccountId}'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ---- Logging Bucket for CloudFront ----
  LoggingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'smg-logs-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ---- Security Headers Policy ----
  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: SMGSecurityHeadersPolicy
        Comment: Security headers for Scots Music Group
        SecurityHeadersConfig:
          ContentSecurityPolicy:
            Override: true
            ContentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com; connect-src 'self'; frame-ancestors 'none'"
          StrictTransportSecurity:
            Override: true
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Preload: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            Override: true
            FrameOption: DENY
          ReferrerPolicy:
            Override: true
            ReferrerPolicy: strict-origin-when-cross-origin
        CustomHeadersConfig:
          Items:
            - Header: Permissions-Policy
              Value: "camera=(), microphone=(), geolocation=()"
              Override: true

  # ---- CloudFront Distribution ----
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Scots Music Group static site
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100  # US + Europe only — cheapest
        IPV6Enabled: true
        ServerTimingLoggingConfig:
          Enabled: false

        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''  # Required empty for OAC
            OriginAccessControlId: !Ref OriginAccessControl

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy

        Logging:
          Bucket: !GetAtt LoggingBucket.DomainName
          IncludeCookies: false
          Prefix: cdn/

        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 60
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 60

        # Custom domain config (conditional)
        Aliases:
          !If
            - HasCustomDomain
            - [!Ref DomainName]
            - !Ref 'AWS::NoValue'
        ViewerCertificate:
          !If
            - HasCustomDomain
            - AcmCertificateArn: !Ref AcmCertificateArn
              MinimumProtocolVersion: TLSv1.2_2021
              SslSupportMethod: sni-only
            - CloudFrontDefaultCertificate: true

  # ---- Deploy User (for GitHub Actions OIDC or IAM) ----
  DeployPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub 'smg-deploy-policy-${AWS::AccountId}'
      Description: Permissions for GitHub Actions to deploy static site
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3Sync
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
              - s3:GetObject
            Resource:
              - !GetAtt SiteBucket.Arn
              - !Sub '${SiteBucket.Arn}/*'
          - Sid: CloudFrontInvalidate
            Effect: Allow
            Action:
              - cloudfront:CreateInvalidation
            Resource:
              - !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}'

Outputs:
  BucketName:
    Description: S3 bucket for site files
    Value: !Ref SiteBucket

  DistributionId:
    Description: CloudFront distribution ID (needed for cache invalidation)
    Value: !Ref Distribution

  DistributionDomain:
    Description: CloudFront domain name
    Value: !GetAtt Distribution.DomainName

  SiteUrl:
    Description: Live site URL
    Value: !If
      - HasCustomDomain
      - !Sub 'https://${DomainName}'
      - !Sub 'https://${Distribution.DomainName}'

  DeployPolicyArn:
    Description: IAM policy ARN to attach to your deploy user/role
    Value: !Ref DeployPolicy
