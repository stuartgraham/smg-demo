name: Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

env:
  AWS_REGION: eu-west-1
  SAM_CLI_TELEMETRY: 0

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check if infra changed
        id: infra
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qE '^(template\.yaml|samconfig\.toml)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy CloudFront stack
        if: steps.infra.outputs.changed == 'true'
        run: |
          sam deploy \
            --parameter-overrides \
              DomainName=${{ secrets.DOMAIN_NAME }} \
              AcmCertificateArn=${{ secrets.ACM_CERTIFICATE_ARN }}

      - name: Read stack outputs
        id: stack
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name smg-site \
            --query 'Stacks[0].Outputs' \
            --region ${{ env.AWS_REGION }} \
            --output json)
          echo "bucket=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="BucketName") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "dist_id=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="DistributionId") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "site_url=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="SiteUrl") | .OutputValue')" >> "$GITHUB_OUTPUT"

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ steps.stack.outputs.bucket }} \
            --delete \
            --cache-control "public, max-age=86400" \
            --exclude "*.html" \
            --exclude "*.json"

          aws s3 sync dist/ s3://${{ steps.stack.outputs.bucket }} \
            --cache-control "public, max-age=3600" \
            --include "*.html" \
            --include "*.json" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.dist_id }} \
            --paths "/*"

      - name: Site URL
        run: echo "Site deployed at ${{ steps.stack.outputs.site_url }}"
